<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LeeAIEx</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup-card">
      <div class="brand-block">
        <h1>LeeAIEx</h1>
        <p class="tagline">Your coding partner for LeetCode problem solving.</p>
      </div>

      <section class="info-block">
        <p>
          Add your Gemini API key to activate AI guidance directly on LeetCode.
          After opening a problem on leetcode.com, an assistant button appears
          on the right side.
        </p>
      </section>

      <section class="form-block">
        <label for="apiKeyInput">Gemini API Key</label>
        <input
          type="text"
          placeholder="Paste your API key"
          id="apiKeyInput"
          autocomplete="off"
          spellcheck="false"
        />
        <button id="saveApiKeyButton">Save API Key</button>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
